# ============================================================
#  tmux.conf — Catppuccin Mocha · No Mouse · Ctrl+Space
# ============================================================

# ── Prefix ──────────────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ─────────────────────────────────────────────────
set  -g default-terminal   "tmux-256color"
set  -ag terminal-overrides ",xterm-256color:RGB"
set  -g base-index          1          # windows start at 1
setw -g pane-base-index     1          # panes start at 1
set  -g renumber-windows    on         # fill gaps after close
set  -g history-limit       10000
set  -g escape-time         0          # no ESC delay (Vim-friendly)
set  -g focus-events        on
set  -g mouse               off

# ── Keybindings ─────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes (intuitive keys, same directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in same directory
bind c new-window -c "#{pane_current_path}"

# Pane navigation (Vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switching
bind -r C-h previous-window
bind -r C-l next-window

# Kill without confirmation
bind x kill-pane
bind X kill-window

# Copy mode (Vim keys)
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Catppuccin Mocha Palette ─────────────────────────────────
# Base     #1e1e2e   Surface0  #313244   Overlay1  #7f849c
# Mantle   #181825   Surface1  #45475a   Overlay2  #9399b2
# Crust    #11111b   Surface2  #585b70   Subtext0  #a6adc8
# Text     #cdd6f4   Overlay0  #6c7086   Subtext1  #bac2de
# Lavender #b4befe   Blue      #89b4fa   Sapphire  #74c7ec
# Sky      #89dceb   Teal      #94e2d5   Green     #a6e3a1
# Yellow   #f9e2af   Peach     #fab387   Maroon    #eba0ac
# Red      #f38ba8   Mauve     #cba6f7   Pink      #f5c2e7
# Flamingo #f2cdcd   Rosewater #f5e0dc

# ── Status Bar ───────────────────────────────────────────────
set -g status                on
set -g status-position       bottom
set -g status-interval       5
set -g status-style          "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length    30
set -g status-left           "#[bg=#b4befe,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#b4befe]"

# Right: date + time
set -g status-right-length   50
set -g status-right          "#[fg=#585b70]#[bg=#585b70,fg=#cdd6f4] %a %d %b #[bg=#45475a,fg=#cdd6f4] %H:%M #[bg=#b4befe,fg=#1e1e2e,bold] #h "

# Window list
set -g status-justify         left
setw -g window-status-format          "#[bg=#1e1e2e,fg=#6c7086]  #I #W  "
setw -g window-status-current-format  "#[bg=#313244,fg=#89b4fa,bold]  #I #W  "
setw -g window-status-separator       ""

# ── Pane Borders ────────────────────────────────────────────
set -g pane-border-style          "fg=#313244"
set -g pane-active-border-style   "fg=#b4befe"

# ── Messages & Command Prompt ────────────────────────────────
set -g message-style          "bg=#313244,fg=#cdd6f4"
set -g message-command-style  "bg=#313244,fg=#f9e2af"

# ── Copy Mode ────────────────────────────────────────────────
setw -g copy-mode-match-style          "bg=#f9e2af,fg=#1e1e2e"
setw -g copy-mode-current-match-style  "bg=#fab387,fg=#1e1e2e"

# ============================================================
#  Key reference (prefix = Ctrl+Space)
#  |  / -        split pane horizontal / vertical
#  h j k l       navigate panes
#  H J K L       resize panes
#  C-h / C-l     prev / next window
#  c             new window (same dir)
#  x / X         kill pane / window
#  r             reload config
#  Enter         enter copy mode  →  v select, y yank
# ============================================================
