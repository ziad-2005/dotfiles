# ╔══════════════════════════════════════════════════════════════╗
# ║                  KITTY — ULTRA COOL CONFIG                   ║
# ║                    github.com/kovidgoyal                     ║
# ╚══════════════════════════════════════════════════════════════╝

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  FONT
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

font_family          JetBrainsMono Nerd Font
bold_font            JetBrainsMono Nerd Font Bold
italic_font          JetBrainsMono Nerd Font Italic
bold_italic_font     JetBrainsMono Nerd Font Bold Italic

font_size            13.5

# Ligatures — because we're not animals
disable_ligatures    never

# Fine-tune spacing
letter_spacing       0.3
line_height          1.4

# Symbol map for Nerd Font icons
symbol_map           U+E000-U+F8FF JetBrainsMono Nerd Font


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  TOKYO NIGHT STORM COLORSCHEME
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Background & foreground
background            #1e1e2e
foreground            #cdd6f4

# Cursor — electric violet
cursor                #f5e0dc
cursor_text_color     #1e1e2e
cursor_shape          beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.5
cursor_stop_blinking_after 10.0

# Selection
selection_foreground  #1e1e2e
selection_background  #b4befe

# URL underline color when hovering
url_color             #f5e0dc

# Black
color0                #45475a
color8                #585b70

# Red
color1                #f38ba8
color9                #f38ba8

# Green
color2                #a6e3a1
color10               #a6e3a1

# Yellow
color3                #f9e2af
color11               #f9e2af

# Blue
color4                #89b4fa
color12               #89b4fa

# Magenta / Purple
color5                #cba6f7
color13               #f5c2e7

# Cyan
color6                #94e2d5
color14               #94e2d5

# White
color7                #bac2de
color15               #a6adc8


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  WINDOW & PADDING
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

window_padding_width        14 18
window_margin_width         0
single_window_margin_width  -1

# Slightly transparent — just a hint of blur
background_opacity          0.93
dynamic_background_opacity  yes

# macOS blur (ignored on Linux)
macos_titlebar_color        background
macos_option_as_alt         yes

# Window chrome
hide_window_decorations     no
window_border_width         1.5pt
draw_minimal_borders        yes
active_border_color         #b4befe
inactive_border_color       #6c7086
bell_border_color           #f7768e

# Startup geometry
remember_window_size        yes
initial_window_width        1000
initial_window_height       640


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  TABS — look absolutely fire 🔥
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

tab_bar_edge             bottom
tab_bar_style            powerline
tab_powerline_style      slanted
tab_bar_min_tabs         1
tab_bar_align            left

tab_bar_background           #13131f
tab_bar_margin_color         #13131f

active_tab_foreground        #1a1b2e
active_tab_background        #cba6f7
active_tab_font_style        bold

inactive_tab_foreground      #565f89
inactive_tab_background      #181825
inactive_tab_font_style      normal

tab_title_template           " {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title} "


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  SCROLLBACK
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

scrollback_lines        10000
scrollback_pager        less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size  32
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 3.0


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  PERFORMANCE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

repaint_delay           8
input_delay             2
sync_to_monitor         yes


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  MOUSE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

mouse_hide_wait         2.0
detect_urls             yes
open_url_with           default
url_style               curly
copy_on_select          no
focus_follows_mouse     no

# Right-click pastes
mouse_map right press grabbed,ungrabbed paste_from_clipboard


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  BELL — silent but deadly
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

enable_audio_bell       no
visual_bell_duration    0.0
visual_bell_color       #f7768e


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  KEYMAPS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# Clear all defaults cleanly
clear_all_shortcuts no

# --- Clipboard ---
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard
map ctrl+shift+s        paste_from_selection

# --- Font size ---
map ctrl+equal          change_font_size all +1.0
map ctrl+minus          change_font_size all -1.0
map ctrl+0              change_font_size all 0

# --- Tabs ---
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+tab            next_tab
map ctrl+shift+tab      previous_tab
map ctrl+shift+,        move_tab_backward
map ctrl+shift+.        move_tab_forward
map ctrl+shift+alt+t    set_tab_title

# Number tabs
map ctrl+1              goto_tab 1
map ctrl+2              goto_tab 2
map ctrl+3              goto_tab 3
map ctrl+4              goto_tab 4
map ctrl+5              goto_tab 5

# --- Windows / splits ---
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window

# Splits (requires kitten or layouts)
map ctrl+shift+h        launch --location=vsplit --cwd=current
map ctrl+shift+j        launch --location=hsplit --cwd=current

# Resize windows
map ctrl+shift+r        start_resizing_window

# --- Scrollback ---
map ctrl+shift+up       scroll_line_up
map ctrl+shift+down     scroll_line_down
map ctrl+shift+page_up  scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home     scroll_home
map ctrl+shift+end      scroll_end

# --- Search scrollback in pager ---
map ctrl+shift+f        show_scrollback

# --- Misc ---
map ctrl+shift+F5       load_config_file
map ctrl+shift+F6       debug_config
map ctrl+shift+u        kitten unicode_input
map ctrl+shift+i        kitten icat       # inline image preview

# Hint URLs, paths and lines
map ctrl+shift+p>f      kitten hints --type path --program -
map ctrl+shift+p>l      kitten hints --type line --program -
map ctrl+shift+p>w      kitten hints --type word --program -
map ctrl+shift+p>u      kitten hints --type url


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  LAYOUTS  (cycle with ctrl+shift+l)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

enabled_layouts         tall,fat,grid,splits,stack
map ctrl+shift+l        next_layout


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  SHELL INTEGRATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

shell_integration   enabled


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  MISC POLISH
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

confirm_os_window_close     1
close_on_child_death        no
allow_remote_control        yes
listen_on                   unix:/tmp/kitty

# Dim inactive panes slightly
inactive_text_alpha         0.8

# Smooth resize
resize_in_steps             no

# Startup session (optional — create ~/.config/kitty/session.conf)
# startup_session           session.conf
